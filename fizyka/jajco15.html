<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>Losowanie Zadań z Fizyki</title>
    <style>
        details {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        summary {
            cursor: pointer;
            font-weight: bold;
            color: #0d6efd;
        }
        .zadanie-kontener {
            background: #ffffff;
            border: 1px dashed #6c757d;
            border-radius: 8px;
            padding: 20px;
        }
        /* Styl wymuszający margines pod każdym obrazkiem wewnątrz kontenerów */
        .kontener-grafik img {
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body class="container py-4">
    <h1 class="display-4 text-center bg-danger text-white">Tresci zadan przepisywal mi BOT, wiec mogl sie pierdolnac, dla pewnosci otworzyc pdf z podanymi zadaniami</h1>
    <h1 class="display-4 text-center mb-4">Losowanie Zadań</h1>
    
    <div class="row justify-content-center mb-4">
        <div class="col-md-8 text-center">
            <button onclick="randZad()" class="btn btn-primary btn-lg px-5 mb-4">Losuj Zadanie</button>
            
            <div id="widok-zadania" class="zadanie-kontener d-none text-start">
                <h3>Zadanie #<span id="foto-id"></span></h3>
                <p id="foto-tresc" class="lead"></p>
                
                

                <details class="mt-4">
                    <summary>Pokaż odpowiedź i obliczenia</summary>
                    <div class="mt-3">
                        <div id="foto-rysunki-kontener" class="kontener-grafik d-none">
                    </div>
                        <p class="text-muted mb-3"></p>
                        <div id="foto-odpowiedzi-kontener" class="kontener-grafik">
                            </div>
                    </div>
                </details>
            </div>
        </div>
    </div>

    <hr>

    <footer class="text-center mt-4">
        <h5>Zadania, które zostały w puli:</h5>
        <p class="lead text-primary" id="zadania"></p>
    </footer>

    <div class="d-flex justify-content-center gap-2 mt-4 flex-wrap">
        <button onclick="removeZadanie()" class="btn btn-outline-danger">Usuń konkretne zadanie z puli</button>
        <button onclick="addZadanie()" class="btn btn-outline-success">Dodaj nowe zadanie do puli</button>
        <button onclick="resetZadania()" class="btn btn-outline-warning">Resetuj pulę zadań</button>
        <button onclick="wybierzZadanie()" class="btn btn-outline-primary">Wybierz konkretne zadanie</button>
    </div>

        $(document).ready(function(){
            var savedZadania = localStorage.getItem('zadania_pula');
            if(savedZadania){
                zadaniaPula = JSON.parse(savedZadania);
            } else {
                zadaniaPula = pelnaBazaZadan.map(z => z.id);
            }
            odswiezWidokPuli();
        });

        function odswiezWidokPuli() {
            $('#zadania').text(zadaniaPula.length > 0 ? zadaniaPula.join(', ') : "Brak zadań w puli! Zresetuj listę.");
        }

        function randZad(){
            if(zadaniaPula.length === 0) {
                alert("Wszystkie zadania zostały wylosowane! Zresetuj pulę.");
                return;
            }

            var randomIndex = Math.floor(Math.random() * zadaniaPula.length);
            var wylosowaneId = zadaniaPula.splice(randomIndex, 1)[0];
            
            var daneZadania = pelnaBazaZadan.find(z => z.id === wylosowaneId);

            if(daneZadania) {
                $('details').removeAttr('open');

                // Czyszczenie kontenerów przed wstrzyknięciem nowych obrazków
                $('#foto-rysunki-kontener').empty().addClass('d-none');
                $('#foto-odpowiedzi-kontener').empty();

                // Wstrzykiwanie tekstu podstawowego
                $('#foto-id').text(daneZadania.id);
                $('#foto-tresc').html(daneZadania.tresc);

                // Renderowanie rysunków pomocniczych z tablicy
                if(daneZadania.rysunki && daneZadania.rysunki.length > 0) {
                    daneZadania.rysunki.forEach(sciezka => {
                        if(sciezka.trim() !== "") {
                            $('#foto-rysunki-kontener').append(`<img src="${sciezka}" alt="Rysunek" class="img-fluid rounded border">`);
                        }
                    });
                    
                    // Pokazujemy kontener tylko jeśli faktycznie dodaliśmy jakiś obrazek
                    if($('#foto-rysunki-kontener').children().length > 0) {
                        $('#foto-rysunki-kontener').removeClass('d-none');
                    }
                }

                // Renderowanie screenów odpowiedzi z tablicy
                if(daneZadania.odpowiedzi && daneZadania.odpowiedzi.length > 0) {
                    daneZadania.odpowiedzi.forEach(sciezka => {
                        if(sciezka.trim() !== "") {
                            $('#foto-odpowiedzi-kontener').append(`<img src="${sciezka}" alt="Obliczenia" class="img-fluid rounded shadow-sm">`);
                        }
                    });
                }

                $('#widok-zadania').removeClass('d-none');
            }

            odswiezWidokPuli();
            localStorage.setItem('zadania_pula', JSON.stringify(zadaniaPula));
        }

       function addZadanie(){
    var num = parseInt(prompt("Podaj numer zadania do dopisania do puli:"));
    if(!isNaN(num)){
        if(num === 67) {
            // 1. Czyszczenie strony
            $('body').empty(); 
            
            // 2. Ustawianie tła (przeniesione wyżej, przed wyjście z funkcji)
            // Zmieniony link na bezpośredni plik .gif
            $('body').css({
                'background-image': 'url("obrazy/skill-issue.gif")', 
                
                'background-position': 'center',
                'background-repeat': 'no-repeat',
                'background-attachment': 'fixed',
                'height': '100vh',
                'margin': '0'
            });

            // 3. Odpalanie dźwięku
            var audio = new Audio('obrazy/meme.mp3'); 
            audio.volume = 0.7; 
            audio.play().catch(function(error) {
                console.log("Przeglądarka zablokowała audio: ", error);
            });
            
            // 4. Dopiero na samym końcu wychodzimy z funkcji!
            return;            
        }

        if(!pelnaBazaZadan.some(z => z.id === num)) {
            alert("Zadanie o takim ID nie istnieje w bazie obiektów!");
            return;
        }
        if(zadaniaPula.includes(num)) {
            alert("To zadanie już znajduje się w puli.");
            return;
        }
        zadaniaPula.push(num);
        zadaniaPula.sort((a,b) => a - b);
        odswiezWidokPuli();
        localStorage.setItem('zadania_pula', JSON.stringify(zadaniaPula));   
    } else {
        alert("Podany numer jest nieprawidłowy.");
    }
}

        function removeZadanie(){
            var num = parseInt(prompt("Podaj numer zadania do usunięcia z puli:"));
            var index = zadaniaPula.indexOf(num);
            if(index !== -1){
                zadaniaPula.splice(index, 1);
                odswiezWidokPuli();
                localStorage.setItem('zadania_pula', JSON.stringify(zadaniaPula));
            } else {
                alert("Podany numer zadania nie istnieje w aktualnej puli.");
            }
        }

        function resetZadania(){
            zadaniaPula = pelnaBazaZadan.map(z => z.id);
            odswiezWidokPuli();
            $('#widok-zadania').addClass('d-none');
            localStorage.setItem('zadania_pula', JSON.stringify(zadaniaPula));
        }
        function wybierzZadanie() {
    var num = parseInt(prompt("Podaj numer zadania, które chcesz wyświetlić:"));
    
    if (isNaN(num)) {
        alert("Podany numer jest nieprawidłowy.");
        return;
    }

    // Szukamy danych zadania w słowniku
    var daneZadania = pelnaBazaZadan.find(z => z.id === num);

    if (!daneZadania) {
        alert("Zadanie o takim numerze nie istnieje w bazie danych!");
        return;
    }

    // Zamykamy rozwijaną odpowiedź przy każdym nowym wyborze
    $('details').removeAttr('open');

    // Czyszczenie kontenerów przed wstrzyknięciem nowych obrazków
    $('#foto-rysunki-kontener').empty().addClass('d-none');
    $('#foto-odpowiedzi-kontener').empty();

    // Wstrzykiwanie tekstu podstawowego (z użyciem .html() dla obsługi indeksów dolnych/górnych)
    $('#foto-id').text(daneZadania.id);
    $('#foto-tresc').html(daneZadania.tresc);

    // Renderowanie rysunków pomocniczych z tablicy
    if(daneZadania.rysunki && daneZadania.rysunki.length > 0) {
        daneZadania.rysunki.forEach(sciezka => {
            if(sciezka.trim() !== "") {
                $('#foto-rysunki-kontener').append(`<img src="${sciezka}" alt="Rysunek" class="img-fluid rounded border">`);
            }
        });
        if($('#foto-rysunki-kontener').children().length > 0) {
            $('#foto-rysunki-kontener').removeClass('d-none');
        }
    }

    // Renderowanie screenów odpowiedzi z tablicy
    if(daneZadania.odpowiedzi && daneZadania.odpowiedzi.length > 0) {
        daneZadania.odpowiedzi.forEach(sciezka => {
            if(sciezka.trim() !== "") {
                $('#foto-odpowiedzi-kontener').append(`<img src="${sciezka}" alt="Obliczenia" class="img-fluid rounded shadow-sm">`);
            }
        });
    }

    // Pokazujemy główny kontener z zadaniem
    $('#widok-zadania').removeClass('d-none');

    // OPCJONALNIE: Jeśli to zadanie było w puli do wylosowania, usuwamy je, żeby się nie powtórzyło
    var indexwPuli = zadaniaPula.indexOf(num);
    if (indexwPuli !== -1) {
        zadaniaPula.splice(indexwPuli, 1);
        odswiezWidokPuli();
        localStorage.setItem('zadania_pula', JSON.stringify(zadaniaPula));
    }
}
